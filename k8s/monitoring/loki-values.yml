deploymentMode: SingleBinary

loki:
  auth_enabled: false
  storage:
    type: filesystem
  commonConfig:
    replication_factor: 1

singleBinary:
  replicas: 1

# Disable scalable targets (only SingleBinary)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
