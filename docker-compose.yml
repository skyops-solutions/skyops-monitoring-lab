services:
  app:
    build: .
    container_name: skyops-app
    restart: unless-stopped
    networks:
      - app-network
    labels:
      logging: "promtail"
      app: "skyops"

  nginx:
    image: nginx:alpine
    container_name: skyops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    labels:
      logging: "promtail"

networks:
  app-network:
    name: app-network
    driver: bridge
